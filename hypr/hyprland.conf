
# Monitor Setup
monitor=,preferred,auto,1
# --- OMAR'S CLEAN HYPRLAND CONFIG ---

# Input Setup
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

# Look and Feel (No Google Fonts)
general {
    gaps_in = 3
    gaps_out = 6
    border_size = 1
    col.active_border = rgb(967bb6)
    col.inactive_border = rgb(808080)
    layout = dwindle
}

decoration {
    rounding = 13            # Matches your Waybar corners exactly
    rounding_power = 4.0     # The "Squircle" - looks much more modern than a circle
    
    active_opacity = 0.95    # Slight transparency to see the wallpaper girl/visuals
    inactive_opacity = 0.85  # Dims inactive windows so you can focus
    
    dim_inactive = true
    dim_strength = 0.1       # Very subtle dimming for a "pro" feel

    blur {
        enabled = true
        size = 6
        passes = 3           # 3 passes makes the blur look "creamy" and smooth
        new_optimizations = true
        xray = true          # Saves GPU; floating windows ignore tiled ones in blur
        vibrancy = 0.16      # Makes the purple tones in your wallpaper "pop" through
    }
}

# --- CLASSIC BINDS ---
$mainMod = SUPER

bind = $mainMod, Q, exec, kitty
bind = $mainMod, T, exec, kitty
bind = $mainMod, E, exec, thunar
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit, 
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, rofi -show drun # Simple App Launcher

# Workspace Switching (1-10)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move Window to Workspace (Shift + 1-10)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
# --- INSTANT SCREENSHOTS ---

# Super + Print: Select region -> Clipboard + Notification
bind = $mainMod, Print, exec, grim -g "$(slurp)" - | wl-copy && notify-send "Screenshot" "Region copied to clipboard" -i camera-photo

# Print (alone): Full screen -> Clipboard + Notification
bind = , Print, exec, grim - | wl-copy && notify-send "Screenshot" "Full screen copied to clipboard" -i camera-photo 
# --- AUTOSTART ---
# No more quickshell/ags. Just a wallpaper and maybe a simple bar.
exec-once = hyprpaper
exec-once = waybar
exec-once = systemctl --user start hyprpolkitagent
exec-once = wl-paste --type text --watch cliphist store # Stores text
exec-once = wl-paste --type image --watch cliphist store # Stores images
# --- MEDIA CONTROLS ---
# Volume (l = repeat while holding)
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5 && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -t 1000 "Volume: $(pamixer --get-volume)%"
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5 && notify-send -h string:x-canonical-private-synchronous:sys-notify -u low -t 1000 "Volume: $(pamixer --get-volume)%"
bindl  = , XF86AudioMute, exec, pamixer -t

# Playback
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
